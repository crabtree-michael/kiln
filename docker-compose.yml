# Kiln — the whole system on one machine. v1 is local-only (02 §1, §4):
#   `docker compose up` brings up Postgres + backend + frontend.
# Provider credentials (LLM, STT/TTS, Amika, push) come from a local .env
# (see .env.example); never commit real secrets (02 §12).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kiln
      POSTGRES_PASSWORD: kiln
      POSTGRES_DB: kiln
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kiln -d kiln']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      # The backend Dockerfile REQUIRES the repo root as context since 5357d05
      # (it copies frontend/ too, to embed the SPA — see the note at its top).
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Board state + durable event queue live in the same Postgres (02 §3).
      DATABASE_URL: postgres://kiln:kiln@db:5432/kiln?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Brain model (06 §2). Pinned to Claude Haiku while the per-project model
      # selector is hidden in the dashboard; override via KILN_BRAIN_MODEL in .env
      # if you need a different model (matches the backend default).
      KILN_BRAIN_MODEL: ${KILN_BRAIN_MODEL:-claude-haiku-4-5-20251001}
      KILN_LOG_LEVEL: ${KILN_LOG_LEVEL:-info}
      # Agent-runtime provider (05 §9). Default AGENT_MODE=amika hits the real Amika
      # API, so the backend needs the key + provider config from .env; unset vars fall
      # back to the backend's own defaults (getenvDefault treats empty as unset).
      AGENT_MODE: ${AGENT_MODE:-}
      # Per-environment worker-name scope (05 §4, amended 2026-07-05). Local dev
      # defaults to kiln-dev-worker- so this stack's reconciler never adopts or
      # destroys another environment's sandboxes (e.g. prod's kiln-worker-*) on
      # the shared Amika account — and vice versa.
      KILN_WORKER_PREFIX: ${KILN_WORKER_PREFIX:-kiln-dev-worker-}
      AMIKA_API_KEY: ${AMIKA_API_KEY:-}
      AMIKA_BASE_URL: ${AMIKA_BASE_URL:-}
      AMIKA_REPO_URL: ${AMIKA_REPO_URL:-}
      AMIKA_SNAPSHOT: ${AMIKA_SNAPSHOT:-}
      # Org agent-credential id attached to created sandboxes so the coding agent can
      # authenticate (without it, API-key-created sandboxes fail "Agent command failed").
      AMIKA_CLAUDE_CRED_ID: ${AMIKA_CLAUDE_CRED_ID:-}
      # STT provider (09 §2, §6). The backend mints a short-lived AssemblyAI
      # streaming token; the browser opens the STT socket directly. Key never
      # leaves the backend (02 §2). Sourced from .env.
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      KILN_WORKER_COUNT: ${KILN_WORKER_COUNT:-}
      # The brain's repo-inspection bash tool (design 2026-07-04): the backend clones
      # this repo at boot and runs allowlisted git/gh/rg in it so the brain can verify
      # an agent's work is pushed before accept_to_done. Sourced from .env; unset ->
      # the tool reports "unavailable" and nothing else breaks. KILN_REPO_DIR matches
      # the Dockerfile's writable default.
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:-}
      KILN_REPO_DIR: ${KILN_REPO_DIR:-/var/lib/kiln/repo}
      # Dev/e2e only: mount POST /api/dev/tickets so a test can seed a ticket without
      # the brain. v1 is local-only (02 §1); default on for this stack, never prod.
      KILN_DEV_ENDPOINTS: ${KILN_DEV_ENDPOINTS:-1}
      # Multi-user phase 1 (spec 11 §2, §7): dashboard GitHub sign-in. All
      # optional locally — unset ⇒ GET /api/me 404s, so /dashboard shows the
      # sign-in view with an error notice above the link (the failed initial
      # load), not a bare "Continue with GitHub" as if simply signed out.
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      KILN_ALLOWED_GITHUB_USERS: ${KILN_ALLOWED_GITHUB_USERS:-}
      KILN_SECRETS_KEY: ${KILN_SECRETS_KEY:-}
      # Phase 2 (spec 11 §3): GitHub login the boot-time adoption seeds the owner
      # user/project from and backfills every legacy orphan row into. Unset ⇒ no
      # adoption (the NOT NULL finalizer still runs, a no-op on a fresh DB).
      KILN_BOOTSTRAP_GITHUB_USER: ${KILN_BOOTSTRAP_GITHUB_USER:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    environment:
      # Client is thin/disposable and reaches the backend only (02 §2). It talks
      # same-origin (/api/...); the vite dev server proxies /api to the backend.
      # Inside this container the backend is the `backend` compose service, not
      # localhost (see frontend/vite.config.ts).
      KILN_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  db-data:
  frontend-node-modules:
