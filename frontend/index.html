<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <!-- Deploy-rollover recovery (bootstrap). MUST run before the hashed entry
         module/CSS Vite injects into <head>: if one of those 404s (a stale shell
         after a deploy, no SW to recover), src/asset-recovery.ts never runs, so
         the reload must be armed here first. A capture-phase listener catches the
         non-bubbling resource error and force-reloads once onto the current
         build's shell, guarded by the same sessionStorage key the module uses so
         the two never reload-storm each other. Keep in sync with
         src/asset-recovery.ts (RELOAD_GUARD_KEY / the 10000ms window). -->
    <script>
      (function () {
        var GUARD = 'kiln:asset-recovery-reloaded-at';
        var MIN_INTERVAL_MS = 10000;
        function isHashedAsset(url) {
          try {
            var u = new URL(url, location.origin);
            return u.origin === location.origin && u.pathname.indexOf('/assets/') === 0;
          } catch (e) {
            return false;
          }
        }
        function recover() {
          try {
            var last = parseInt(sessionStorage.getItem(GUARD) || '', 10);
            if (!isNaN(last) && Date.now() - last < MIN_INTERVAL_MS) return;
            sessionStorage.setItem(GUARD, String(Date.now()));
          } catch (e) {
            // storage unavailable — still attempt a single reload below
          }
          location.reload();
        }
        window.addEventListener(
          'error',
          function (event) {
            var el = event.target;
            var url =
              el && el.tagName === 'LINK' ? el.href : el && el.tagName === 'SCRIPT' ? el.src : null;
            if (url && isHashedAsset(url)) recover();
          },
          true,
        );
      })();
    </script>
    <!-- Default system-chrome colour: the light paper surface (--surface-page,
         docs/ui/Kiln Colors.html), so the installed PWA's status bar and
         safe-area strips read as the app's own surface. `ThemeColorSync`
         (src/theme.ts) rewrites this at runtime to the active theme's surface —
         dark on /debug and when the OS prefers dark. Fonts are self-hosted via
         @fontsource variable packages (imported in main.tsx), so there are no
         external font links here. -->
    <meta name="theme-color" content="#faf6ef" />
    <title>Kiln</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
