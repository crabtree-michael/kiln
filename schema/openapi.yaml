# OpenAPI 3.0.3: oapi-codegen (Go generator) does not yet fully support 3.1, so we
# pin 3.0.x for cross-language generation. openapi-typescript handles it fine too.
openapi: 3.0.3
info:
  title: Kiln Wire Contract
  version: 0.0.0
  description: >
    The single language-neutral contract for the client<->server boundary
    (docs/specs/02 §3). This file is the source of truth: Go and TS types are
    GENERATED from it (see schema/README.md). Never hand-edit the generated types
    — change this file and regenerate both sides atomically (AGENTS.md).

    Endpoint set and payload shapes realize docs/specs/04-runtime-and-api.md §7
    (transport, /api/board, /api/stream) as amended by
    docs/specs/07-v1-text-client.md §4 (the text-neutral renames: human.message,
    POST /api/message, SSE `say`, and the new GET /api/messages). Board/Ticket
    field names mirror internal/board's Snapshot/Ticket (03 §2, §4) so the
    client can render Backlog[Shaping/Ready], Developing[Blocked>Working], Done,
    capacity, and Ready in pull order directly off the wire shape (07 §7).
servers:
  - url: http://localhost:8080
    description: Local backend (Docker Compose)
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe.
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /api/board:
    get:
      operationId: getBoard
      summary: Full board snapshot (03 §4 GetBoard; 04 §7).
      description: >
        The same absolute snapshot the `board` SSE event carries — for
        initial render before /api/stream attaches, or a manual resync
        (04 §7). Never a delta (03 D7).
      responses:
        '200':
          description: Current board snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
  /api/activity:
    get:
      operationId: getActivityStatus
      summary: Current thinking state for resume-time resync (08 §4).
      description: >
        The authoritative current value of the `thinking` bracket — the same
        flag the `activity` kind=thinking SSE event toggles. Unlike that event,
        which is ephemeral and never replayed on reconnect, this is a pull: the
        client calls it on foreground/resume (and on stream reconnect) to resync
        the spinner to the real current state, closing the gap where a missed
        `on:false` (app backgrounded mid-pass) leaves the indicator stuck.
        Toasts are not resyncable (they auto-dismiss) and are not carried here.
      responses:
        '200':
          description: Current thinking state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityStatus'
  /api/message:
    post:
      operationId: postMessage
      summary: Send a user chat message (07 §3–§4, amending 04 §7).
      description: >
        Transactional transcript append (role=user) + EnqueueEvent
        (human.message, payload {text}) in one transaction — the transcript
        and the event queue cannot disagree (07 §3). `09` puts STT in front
        of this same seam without changing it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
      responses:
        '202':
          description: >
            Accepted — the user row is durably appended and the
            human.message event is enqueued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePostResponse'
  /api/messages:
    get:
      operationId: getMessages
      summary: Recent transcript rows, oldest-first (07 §4).
      description: >
        New in 07: initial chat-panel render and the post-reconnect
        reconciliation fetch (07 §5, §8).
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of most-recent rows to return.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        '200':
          description: The most-recent `limit` transcript rows, oldest-first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
  /api/feed:
    get:
      operationId: getFeed
      summary: Full feed snapshot for the primary screen (08 §3, D2′).
      description: >
        The same absolute snapshot the `feed` SSE event carries — for initial
        render before /api/stream attaches, or a manual resync (08 §3, mirroring
        04 D7). Assembled server-side (08 §7): derived blocker/proposal cards
        from board state joined with the NEWEST PAGE of unretracted brain-authored
        update/preview notifications — seen AND unseen (08 D2′, retained history),
        in strict order (blockers -> proposals -> updates newest-first).
        `summary.last_seen_notification_id` marks the last-seen divider boundary
        and `has_more_history` signals older updates are pageable via
        /api/feed/history. Never a delta.
      responses:
        '200':
          description: Current feed snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedSnapshot'
  /api/feed/history:
    get:
      operationId: getFeedHistory
      summary: One older page of retained update/preview history (08 §3, D2′).
      description: >
        Keyset pagination over retained (unretracted) update/preview
        notifications, newest-first, older than the `before` cursor — the
        "Show earlier updates" affordance (08 §3, D2′). Blockers and proposals are
        board-derived and never paged; this returns only notification-backed
        cards. Mirrors the /api/messages `limit` convention. `before` omitted
        means start from the newest (rarely needed — GET /api/feed already carries
        the first page). `has_more` signals another page remains.
      parameters:
        - name: before
          in: query
          required: false
          description: >
            Exclusive upper-bound notification id; returns cards with id < before.
            Omit for the newest page.
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          required: false
          description: Page size (default 30, bounds 1–100).
          schema:
            type: integer
      responses:
        '200':
          description: One older page of update/preview cards, newest-first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedHistoryPage'
  /api/feed/seen:
    post:
      operationId: postFeedSeen
      summary: Ack that update cards up to a high-water mark were seen (08 §3).
      description: >
        Retained-history semantics (08 D2′): stamps seen_at on every unseen
        notification with id <= last_notification_id, advancing the persistent
        last-seen high-water mark. Seen updates STAY in the feed as history below
        the last-seen divider (they no longer drop out); the mark only moves the
        divider on the next visit. Blockers and proposals ignore seen entirely.
        Fired by the client when update cards render on a foregrounded, visible
        screen (08 §3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedSeenRequest'
      responses:
        '202':
          description: Accepted — the seen high-water mark was stamped.
  /api/feed/{id}/dismiss:
    post:
      operationId: dismissFeedCard
      summary: Clear (dismiss) a single update/preview card — swipe-to-dismiss (08 §3).
      description: >
        Clears one notification-backed feed card for good: retracts the
        notification behind it (the same stamp the brain's retract makes, but
        user-initiated by swiping the row left) so it drops from the feed and does
        not return on the next snapshot or reload. Only update/preview cards are
        dismissible — blockers and proposals are board-derived state the brain
        owns, not notifications, and have no id to dismiss. Emits feed.updated so
        the card leaves every open client. Idempotent: dismissing an already-gone
        or unknown id is a no-op and still returns 202.
      parameters:
        - name: id
          in: path
          required: true
          description: The card's notification id (FeedCard.notification_id).
          schema:
            type: integer
            format: int64
      responses:
        '202':
          description: Accepted — the card was dismissed.
  /api/feed/dismiss-all:
    post:
      operationId: dismissAllFeedCards
      summary: Clear (dismiss) every feed notification at once — the header trash affordance (08 §3).
      description: >
        Clears all notification-backed feed cards for good in one shot: retracts
        every still-active notification (the bulk sibling of the single-card
        dismiss), so they drop from the feed and none return on the next snapshot
        or reload. Board-derived cards (blockers and proposals) are untouched —
        they are board state the brain owns, not notifications. Emits one
        feed.updated so the cards leave every open client. Idempotent: clearing an
        already-empty feed is a no-op and still returns 202.
      responses:
        '202':
          description: Accepted — all notifications were dismissed.
  /api/tickets/{id}/accept:
    post:
      operationId: acceptTicket
      summary: Accept a proposal (08 §5).
      description: >
        Tap-accept on a proposal card. Per this project's decision (overriding
        08 D6), acceptance routes through the brain: this appends a user
        transcript row and enqueues a human.message event expressing the
        acceptance, exactly like POST /api/message. The brain then marks the
        ticket Ready via mark_ready. Voice accept flows through the same brain
        path (08 §5).
      parameters:
        - name: id
          in: path
          required: true
          description: The Shaping ticket's id (must have approval_requested set).
          schema:
            type: string
      responses:
        '202':
          description: >
            Accepted — the acceptance user row is appended and the human.message
            event is enqueued for the brain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePostResponse'
  /api/beta-signup:
    post:
      operationId: postBetaSignup
      summary: Collect a beta-interest email from the landing page.
      description: >
        The marketing landing page's "Join the beta" form posts one email here.
        Idempotent on the address (a repeat submit is a no-op, still 202) so the
        client can always redirect to the confirmation page on success. Stored in
        the beta module's beta_signups table; there is no read side in v1.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BetaSignupRequest'
      responses:
        '202':
          description: Accepted — the email is recorded (or was already present).
        '400':
          description: Invalid request body (missing or malformed email).
  /api/voice/token:
    post:
      operationId: postVoiceToken
      summary: Mint a short-lived AssemblyAI streaming token (09 §6).
      description: >
        The client calls this, then opens AssemblyAI's Universal-Streaming
        WebSocket directly with the returned token — audio never transits the
        Kiln backend, and the real API key never leaves /backend (09 §2, 02 §2).
        Thin handler over the STT-provider port; the concrete AssemblyAI client
        lives in infra and is wired at the composition root. Token expiry is
        <= 10 min (09 §6).
      responses:
        '200':
          description: A temporary streaming token and its absolute expiry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceToken'
        '502':
          description: The STT provider failed to mint a token.
  /api/push/key:
    get:
      operationId: getPushKey
      summary: The VAPID public key the client subscribes with (02 §10).
      description: >
        Returns the server's VAPID application server key, base64url-encoded, for
        the client's `pushManager.subscribe({ applicationServerKey })` call. The
        matching private key never leaves /backend. 404 when push is not
        configured (the VAPID env vars are unset) — the client treats that as
        "notifications unavailable" and hides the toggle.
      responses:
        '200':
          description: The VAPID public key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushKey'
        '404':
          description: Push is not configured on this deployment.
  /api/push/subscribe:
    post:
      operationId: postPushSubscribe
      summary: Register a browser push subscription (02 §10).
      description: >
        Stores the browser `PushSubscription` (endpoint + p256dh/auth keys) so the
        runtime's notify.send executor can deliver Web Push messages to it. Upsert
        on endpoint — a re-subscribe from the same browser is idempotent. Single
        user in v1: subscriptions are stored globally and every notification fans
        out to all of them.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushSubscription'
      responses:
        '204':
          description: Subscription stored.
        '400':
          description: Invalid request body.
    delete:
      operationId: deletePushSubscribe
      summary: Remove a browser push subscription (02 §10).
      description: >
        Drops the subscription for the given endpoint so the runtime stops
        fanning notifications out to a device the user disabled. Scoped to the
        signed-in user, and idempotent — deleting an unknown or already-removed
        endpoint still returns 204. Complements the sender's own pruning of
        endpoints the push service reports gone (404/410); this lets a device
        that disables notifications clear its row immediately rather than waiting
        for the next send.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushUnsubscribe'
      responses:
        '204':
          description: Subscription removed (or already absent).
        '400':
          description: Invalid request body.
  /api/push/mode:
    get:
      operationId: getPushMode
      summary: The current push-notification frequency mode (02 §10).
      description: >
        Returns the global notification mode that gates when the runtime emits a
        Web Push message. `blocked` (the default) notifies only when a ticket
        needs a human decision; `all` notifies on every feed update (a testing
        aid). Single user in v1, so the mode is a single global value.
      responses:
        '200':
          description: The current mode.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationMode'
    put:
      operationId: putPushMode
      summary: Set the push-notification frequency mode (02 §10).
      description: >
        Persists the global notification mode. Takes effect on the next feed
        update; single user in v1, so it applies to every stored subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationMode'
      responses:
        '200':
          description: The mode after the update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationMode'
        '400':
          description: Invalid request body (mode not one of the allowed values).
  /api/stream:
    get:
      operationId: getStream
      summary: SSE stream of `board`, `say`, `feed`, and `activity` events (04 §7, 07 §4, 08 §3–§4).
      description: >
        Server-sent events; not a JSON response. Four named SSE event types
        ride this one connection: `board` (payload: Board — the full snapshot,
        sent immediately on connect and again per board.updated outbox entry,
        absolute and never a delta — 03 D7/04 D7); `say` (payload: SayEvent —
        one per brain say, renamed from `speak`, 07 A1); `feed` (payload:
        FeedSnapshot — the full visible feed, sent per feed.updated outbox
        entry, absolute; reconnect's resync is the next `feed` event — 08 §3);
        and `activity` (payload: ActivityEvent — ephemeral, SSE-only, never
        stored: thinking on/off and per-transition action toasts — 08 §4).
        Comment-line keepalive every 25s. `Last-Event-ID` is unused. This
        operation is declared for documentation and so the payload schemas below
        generate into both sides' types; the actual response content type is
        `text/event-stream`.
      responses:
        '200':
          description: >
            text/event-stream carrying `board` (Board), `say` (SayEvent),
            `feed` (FeedSnapshot), and `activity` (ActivityEvent) named SSE
            events.
          content:
            text/event-stream:
              schema:
                type: string
  /api/me:
    get:
      operationId: getMe
      summary: Current user, project, and config status (11 §4). Session-protected.
      responses:
        '200':
          description: The signed-in user's account view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '401':
          description: No valid session.
  /api/settings:
    put:
      operationId: putSettings
      summary: Partial credential update (11 §4). Secrets are write-only; empty/omitted fields are unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SettingsUpdateRequest' }
      responses:
        '200':
          description: Updated account view (same shape as GET /api/me).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '400':
          description: Invalid request body.
        '401':
          description: No valid session.
  /api/project:
    put:
      operationId: putProject
      summary: Create-or-update the caller's single project (11 §3–§4).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectUpdateRequest' }
      responses:
        '200':
          description: Updated account view (same shape as GET /api/me).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '400':
          description: Invalid request body.
        '401':
          description: No valid session.
  /api/settings/verify:
    post:
      operationId: postSettingsVerify
      summary: Live connection checks for stored credentials (11 §4).
      responses:
        '200':
          description: Per-check results; unconfigured checks report status "skipped".
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyResponse' }
        '401':
          description: No valid session.
components:
  schemas:
    Health:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
      additionalProperties: false

    Ticket:
      type: object
      description: >
        One ticket as rendered on the board (03 §2.2). Column/zone placement
        is derived from `state`, never carried as a separate field (03 D1).
      required: [id, title, body, state, priority, approval_requested, created_at, updated_at, state_changed_at]
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        state:
          type: string
          description: >
            One of the five board states (03 §2.1). Render mapping: shaping/
            ready -> Backlog; working/blocked -> Developing (blocked stacked
            above working); done -> Done.
          enum: [shaping, ready, working, blocked, done]
        priority:
          type: integer
          description: Backlog ordering for the pull; higher pulls first.
        approval_requested:
          type: boolean
          description: >
            Set by the brain's request_approval tool on a Shaping ticket (08 §5);
            a narrower secondary "explicitly nudged for attention" signal. It no
            longer gates proposal-card visibility: every Shaping ticket surfaces
            as a `proposal` feed card regardless (08 §5, superseding D5).
            Cleared by mark_ready.
        blocked_reason:
          type: string
          nullable: true
          description: Set iff state is blocked (03 I4); full text, shown on the card (07 §7).
        ready_at:
          type: string
          format: date-time
          nullable: true
          description: Set by mark_ready; the pull's tie-breaker (03 §5).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          description: Time of the ticket's last mutation of any kind (bumped by nudges too).
        state_changed_at:
          type: string
          format: date-time
          description: >
            When the ticket last entered its current `state` (03 §2.2). Advances
            only on a real state transition, never on a same-state mutation such
            as a Working->Working nudge — the true "time in status" clock the
            client renders as the ticket-row subtext.
      additionalProperties: false

    AgentStatus:
      type: object
      description: >
        One live worker's real underlying session status, joined to its
        most-recent ticket binding (amended 2026-07-05). This is the actual
        agent/session running state — distinct from a ticket's board-column
        placement — so the Streams view can show a stopped or errored session
        instead of a hardcoded "building". worker_id is the board slot uuid;
        ticket_id is "" for an idle-pool worker that never ran a send.
      required: [worker_id, ticket_id, status]
      properties:
        worker_id:
          type: string
        ticket_id:
          type: string
        status:
          type: string
          description: >
            building = alive with a turn in flight; idle = alive, no turn;
            stopped = session auto-stopped/not running; errored = terminal
            session failure; starting = session provisioning, not reachable yet.
          enum: [building, idle, stopped, errored, starting]
      additionalProperties: false

    SystemAlert:
      type: object
      description: >
        A persistent system-health problem surfaced to the user as a permanent
        error band above the dock — distinct from an auto-dismissing activity
        toast (08 §4): it stays until the condition clears. Deliberately
        generic: the client renders any alert without knowing its cause, so the
        section works for any persistent failure, not just sandboxes. `kind` is
        an opaque machine category the client may theme off but must not depend
        on; `detail` is the human-readable sentence shown verbatim. Rides the
        board snapshot's `alerts` array, which is absolute like the rest of the
        snapshot — an alert simply drops out of the next snapshot once its
        underlying condition recovers.
      required: [kind, detail]
      properties:
        kind:
          type: string
          description: >
            Opaque machine category of the failure (e.g. `sandbox_health`).
            For theming/analytics only — the UI must render any kind.
        detail:
          type: string
          description: >
            Human-readable description shown verbatim (e.g.
            "2 of 5 sandboxes failing").
      additionalProperties: false

    Board:
      type: object
      description: >
        GetBoard's full snapshot (03 §4), grouped in render order — the
        `board` SSE event payload and GET /api/board's response body are the
        identical shape (04 D7): absolute, never a delta, so a reconnect's
        resync is just "render the next board event" (07 §7–§8). `ready` is
        in exact pull order, top-to-bottom, so the user sees what gets
        pulled next (03 §5, 07 §7).
      required: [shaping, ready, blocked, working, done, worker_total, worker_free, agents, alerts]
      properties:
        shaping:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        ready:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        blocked:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        working:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        done:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        worker_total:
          type: integer
          description: Total worker capacity slots (03 §2.3).
        worker_free:
          type: integer
          description: Free (non-busy) worker slots — the capacity chip (07 §7).
        agents:
          type: array
          description: >
            Live workers with their real session status, joined server-side for
            the Streams view (amended 2026-07-05). Absolute like the rest of the
            snapshot; empty before the first worker is live. Keyed to tickets by
            ticket_id.
          items:
            $ref: '#/components/schemas/AgentStatus'
        alerts:
          type: array
          description: >
            Persistent system-health problems to surface as a permanent error
            band above the dock. Absolute like the rest of the snapshot: an
            alert stays present across snapshots until its condition clears,
            then drops out. Empty in the healthy steady state.
          items:
            $ref: '#/components/schemas/SystemAlert'
      additionalProperties: false

    Message:
      type: object
      description: >
        One persisted transcript row (07 §3), as returned oldest-first by
        GET /api/messages.
      required: [message_id, role, text, timestamp]
      properties:
        message_id:
          type: integer
          format: int64
        role:
          type: string
          enum: [user, kiln]
        text:
          type: string
        timestamp:
          type: string
          format: date-time
      additionalProperties: false

    MessageRequest:
      type: object
      description: POST /api/message body (07 §4). Text only in v1; 09 adds STT in front of this seam.
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4000
      additionalProperties: false

    MessagePostResponse:
      type: object
      description: POST /api/message's 202 body (07 §4) — both ids the client needs to reconcile its optimistic send.
      required: [event_id, message_id]
      properties:
        event_id:
          type: integer
          format: int64
        message_id:
          type: integer
          format: int64
      additionalProperties: false

    SayEvent:
      type: object
      description: >
        The `say` SSE event payload (07 §4) — one event per brain say
        (renamed from `speak`, 07 A1). message_id matches the corresponding
        Message row from GET /api/messages/the transcript.
      required: [message_id, text, at]
      properties:
        message_id:
          type: integer
          format: int64
        text:
          type: string
        at:
          type: string
          format: date-time
      additionalProperties: false

    BetaSignupRequest:
      type: object
      description: POST /api/beta-signup body — the visitor's email for the beta list.
      required: [email]
      properties:
        email:
          type: string
          description: >
            The visitor's email. Kept a plain string on the wire (no format:email,
            which would pull an openapi_types dependency into the generated Go);
            the server validates it parses as a real address (net/mail).
          minLength: 3
          maxLength: 254
      additionalProperties: false

    VoiceToken:
      type: object
      description: >
        POST /api/voice/token's 200 body (09 §2, §6): a short-lived AssemblyAI
        Universal-Streaming token and its absolute expiry. The client opens the
        STT WebSocket with `token` and refreshes proactively before `expires_at`.
      required: [token, expires_at]
      properties:
        token:
          type: string
          description: The temporary AssemblyAI streaming token (bearer for the wss connection).
        expires_at:
          type: string
          format: date-time
          description: Absolute expiry (backend-computed from the provider's redemption window).
      additionalProperties: false

    FeedCard:
      type: object
      description: >
        One backlog item on the primary screen (08 §3). Hybrid-sourced but the
        client renders one list and never knows the difference: `blocker` and
        `proposal` are derived from board state; `update` and `preview` are
        brain-authored notification rows. The visible tag (Blocker/Proposal/
        Update/Preview) is derived from `kind` on the client.
      required: [kind, id, label, body, created_at]
      properties:
        kind:
          type: string
          description: >
            blocker -> ticket in the Blocked zone (body is blocked_reason);
            proposal -> Shaping ticket with approval_requested (body is the
            shaped summary, Accept affordance shown); update -> brain-authored
            note; preview -> brain-authored note with an image; poke ->
            mechanical stall nudge (body empty; the ticket title carries a 👉);
            done -> mechanical completion card (body empty; the ticket title
            carries a ✅).
          enum: [blocker, proposal, update, preview, poke, done]
        id:
          type: string
          description: >
            Stable render key. `blocker:<ticket_id>`, `proposal:<ticket_id>`,
            or `update:<notification_id>`.
        label:
          type: string
          description: >
            The short stream/ticket label shown above the card body (e.g. the
            ticket title). May be empty for an authored note with no linked ticket.
        body:
          type: string
        ticket_id:
          type: string
          nullable: true
          description: Set for blocker/proposal (the derived ticket); optional for authored notes.
        notification_id:
          type: integer
          format: int64
          nullable: true
          description: >
            Set for update/preview cards; the id the client passes to
            /api/feed/seen as the high-water mark (08 §3).
        image_url:
          type: string
          nullable: true
          description: Set for preview cards — the embedded render (08 §3, 4c).
        github_url:
          type: string
          nullable: true
          description: >
            Set for done cards — the GitHub web page for the landed work (the
            commit on origin/main under merge-on-main, or the pull request under
            the PR gate). The card's second line links here (08 §7).
        github_label:
          type: string
          nullable: true
          description: >
            Set for done cards alongside github_url — the clickable link text:
            the abbreviated commit SHA, or "#<number>" for a pull request.
        work_summary:
          type: string
          nullable: true
          description: >
            Set for done cards — the full description of the landed work: the
            entire commit message (subject + body) under the main merge gate, or
            the pull-request title + description under the PR gate. Rendered as the
            card's expandable body — the client previews the first lines and
            reveals the rest on tap (08 §7). Null when unavailable.
        created_at:
          type: string
          format: date-time
          description: >
            When the card became current (blocked-at for blockers, request time
            for proposals, post time for notes); drives the relative age label.
      additionalProperties: false

    FeedSummary:
      type: object
      description: >
        Server-derived header status counts (08 §2). The client renders the
        one-line summary from these: "N blocker(s) · M updates" when blockers
        exist, the active-stream count ("K streams") when not, "Nothing active"
        when the feed is empty; plus the all-clear detail line
        (building/idle/last word).
      required: [blocker_count, update_count, stream_count, building, idle]
      properties:
        blocker_count:
          type: integer
        update_count:
          type: integer
          description: Count of unseen update/preview cards.
        stream_count:
          type: integer
          description: Number of active ticket streams (working + blocked).
        building:
          type: integer
          description: Streams with a worker actively building (working).
        idle:
          type: integer
          description: Active streams not currently building.
        last_word_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent brain say/update, for "last word 6m ago".
        last_seen_notification_id:
          type: integer
          format: int64
          nullable: true
          description: >
            The persistent seen high-water mark (08 D2′): the greatest notification
            id the user has acked. Update/preview cards with a greater
            notification_id are "new since last visit" (above the last-seen
            divider); those at or below it are retained history (below it). Null
            when nothing has ever been seen. The client freezes this at the first
            snapshot of a session so marking-seen-on-view doesn't move the divider
            mid-session.
      additionalProperties: false

    FeedSnapshot:
      type: object
      description: >
        GET /api/feed's body and the `feed` SSE event payload — the identical
        absolute shape (08 §3, D2′). `cards` is in strict order: unresolved
        blockers, then pending proposals, then updates newest-first (seen and
        unseen — retained history). `cards` carries only the NEWEST PAGE of
        updates; `has_more_history` signals older ones are pageable via
        /api/feed/history.
      required: [summary, cards, has_more_history]
      properties:
        summary:
          $ref: '#/components/schemas/FeedSummary'
        cards:
          type: array
          items:
            $ref: '#/components/schemas/FeedCard'
        has_more_history:
          type: boolean
          description: >
            True when retained update/preview history exists older than the oldest
            update card in `cards` — page it in via GET /api/feed/history (08 D2′).
      additionalProperties: false

    FeedHistoryPage:
      type: object
      description: >
        One older page of retained update/preview history (GET /api/feed/history —
        08 §3, D2′): notification-backed cards only, newest-first, older than the
        request's `before` cursor. Board-derived blocker/proposal cards are never
        paged.
      required: [cards, has_more]
      properties:
        cards:
          type: array
          items:
            $ref: '#/components/schemas/FeedCard'
        has_more:
          type: boolean
          description: True when another older page remains beyond this one.
      additionalProperties: false

    FeedSeenRequest:
      type: object
      description: POST /api/feed/seen body (08 §3) — the seen high-water mark.
      required: [last_notification_id]
      properties:
        last_notification_id:
          type: integer
          format: int64
      additionalProperties: false

    ActivityEvent:
      type: object
      description: >
        The `activity` SSE event payload (08 §4) — ephemeral, never stored.
        `thinking` brackets a brain pass (renders the spinner); `toast` confirms
        one side-effect board transition (renders the auto-dismissing pill).
        Fields are keyed by `kind`, mirroring Ticket.state's enum discriminator.
      required: [kind]
      properties:
        kind:
          type: string
          enum: [thinking, toast]
        on:
          type: boolean
          nullable: true
          description: For kind=thinking — true when a pass starts, false when it ends.
        verb:
          type: string
          nullable: true
          description: >
            For kind=toast — the transition: started (dispatched), nudged (new
            turn sent), finished (accepted to done), queued (marked ready).
          enum: [started, nudged, finished, queued]
        ticket_title:
          type: string
          nullable: true
          description: For kind=toast — the affected ticket's title.
        ticket_id:
          type: string
          nullable: true
          description: >
            For kind=toast — the affected ticket's id, so tapping the toast opens
            that ticket's detail view. Absent on a say pill, which names no ticket.
      additionalProperties: false

    ActivityStatus:
      type: object
      description: >
        GET /api/activity response (08 §4) — the current value of the `thinking`
        bracket, pulled by the client on foreground/resume and stream reconnect
        to resync the spinner. Server-authoritative: the client never writes it
        (it is derived from whether a brain pass is in flight), so this is a
        read-only snapshot, not a settable state.
      required: [thinking]
      properties:
        thinking:
          type: boolean
          description: True while a brain pass is in flight (the spinner is showing).
      additionalProperties: false

    Me:
      type: object
      description: The signed-in user's account view (11 §4). Secret values never appear.
      required: [user, settings]
      properties:
        user: { $ref: '#/components/schemas/MeUser' }
        project:
          allOf: [{ $ref: '#/components/schemas/MeProject' }]
          description: Absent until the user creates their project.
        settings: { $ref: '#/components/schemas/MeSettings' }
        providers:
          type: array
          description: >
            The coding-agent providers this deployment offers (multi-provider
            design §8, §9), one descriptor per registered provider. The project
            form renders its provider select from this — a deployment that offers
            only one provider shows a single option (or hides the select). Omitted
            when the deployment has not enabled the descriptor surface.
          items: { $ref: '#/components/schemas/ProviderDescriptor' }
    ProviderDescriptor:
      type: object
      description: >
        A registered coding-agent provider the dashboard can offer (multi-provider
        design §8, D6). Data-driven so the generic dashboard names no provider: the
        select is rendered from these, not from hard-coded Amika/Devin inputs.
      required: [key, label, capabilities]
      properties:
        key:
          type: string
          description: The registry key stored as a project's agent_provider (amika, devin, mock, …).
        label:
          type: string
          description: Human-facing name shown in the provider select (e.g. "Amika", "Devin").
        capabilities: { $ref: '#/components/schemas/ProviderCapabilities' }
    ProviderCapabilities:
      type: object
      description: >
        A provider's declared shape (multi-provider design §5), read by the
        dashboard to light up or hide capability-gated affordances (e.g. a
        workspace-reset button only for a managed-sandbox provider) without naming
        the provider.
      required: [managed_sandbox, reports_cost, snapshots, secrets_inject]
      properties:
        managed_sandbox: { type: boolean }
        reports_cost: { type: boolean }
        snapshots: { type: boolean }
        secrets_inject: { type: boolean }
    MeUser:
      type: object
      required: [github_login, display_name, avatar_url]
      properties:
        github_login: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
    MeProject:
      type: object
      required: [name, repo_url, agent_provider, amika_snapshot, brain_model, worker_count, merge_gate_mode, amika_secrets]
      properties:
        name: { type: string }
        repo_url: { type: string }
        agent_provider:
          type: string
          description: >
            The registry key selecting which coding-agent provider this project's
            turns run on (multi-provider design §9): `amika`, `devin`, `mock`, …
            Empty means "use the deployment default" (AGENT_MODE) — the back-compat
            behavior every existing project keeps.
        amika_snapshot: { type: string }
        brain_model: { type: string }
        worker_count: { type: integer }
        merge_gate_mode:
          type: string
          enum: [main, pr]
          description: >
            Which condition satisfies a ticket's merge gate (06 §7): `main` accepts
            a done only once its commit is on origin/main; `pr` accepts it once the
            work exists in a pull request, merged or not. Defaults to `main`.
        amika_secrets:
          type: array
          description: Amika secrets injected into every sandbox this project starts (02 §8).
          items: { $ref: '#/components/schemas/AmikaSecret' }
    AmikaSecret:
      type: object
      description: >
        One Amika secret injected into every sandbox this project starts (02 §8):
        `name` is the environment-variable name it lands under inside the sandbox
        (the user-facing label), and `value` is the presence+fingerprint of the
        secret value — never the value itself (11 §3 D7). The value is encrypted
        at rest and write-only, so reads only ever carry its status.
      required: [name, value]
      properties:
        name: { type: string }
        value: { $ref: '#/components/schemas/SecretStatus' }
    AmikaSecretInput:
      type: object
      description: >
        One Amika secret on a project upsert (02 §8). `name` is the environment
        variable it is injected as; `value` is write-only — a non-empty value
        sets/replaces the stored (encrypted) secret, and an omitted or empty
        value keeps the value already stored for that name (the credential-merge
        convention, 11 §3 D7). A name dropped from the list clears that secret.
      required: [name]
      properties:
        name: { type: string }
        value: { type: string }
    MeSettings:
      type: object
      description: Config status — secrets as presence+fingerprint only (11 §3 D7).
      required: [anthropic_api_key, amika_api_key, devin_api_key, github_auth_token, amika_claude_cred_id]
      properties:
        anthropic_api_key: { $ref: '#/components/schemas/SecretStatus' }
        amika_api_key: { $ref: '#/components/schemas/SecretStatus' }
        devin_api_key: { $ref: '#/components/schemas/SecretStatus' }
        github_auth_token: { $ref: '#/components/schemas/SecretStatus' }
        amika_claude_cred_id: { type: string }
    SecretStatus:
      type: object
      required: [set, tail]
      properties:
        set: { type: boolean }
        tail:
          type: string
          description: Last 4 characters of the stored secret; empty when unset.
    SettingsUpdateRequest:
      type: object
      description: All fields optional; empty or omitted means unchanged (write-only secrets).
      properties:
        anthropic_api_key: { type: string }
        amika_api_key: { type: string }
        devin_api_key: { type: string }
        github_auth_token: { type: string }
        amika_claude_cred_id: { type: string }
    ProjectUpdateRequest:
      type: object
      required: [name, repo_url]
      properties:
        name: { type: string }
        repo_url: { type: string }
        agent_provider:
          type: string
          description: >
            The registry key selecting this project's coding-agent provider
            (multi-provider design §9). Omitted or empty selects the deployment
            default (AGENT_MODE). The composition root validates the key against the
            registered provider set; an unregistered key pauses the project's board
            loud rather than silently falling back (D7).
        amika_snapshot: { type: string }
        brain_model: { type: string }
        worker_count: { type: integer }
        merge_gate_mode:
          type: string
          enum: [main, pr]
          description: >
            Which condition satisfies a ticket's merge gate (06 §7): `main` (done
            when the commit is on origin/main) or `pr` (done when the work is in a
            pull request). Omitted or empty keeps/defaults to `main`.
        amika_secrets:
          type: array
          description: >
            The project's full Amika secret list. Like the other optional project
            fields on this wholesale upsert, omitted or [] clears it; a name kept
            with an empty value keeps its stored (encrypted) value (02 §8).
          items: { $ref: '#/components/schemas/AmikaSecretInput' }
    VerifyCheck:
      type: object
      required: [name, status, message]
      properties:
        name: { type: string, enum: [anthropic, amika, devin, repo] }
        status: { type: string, enum: [ok, failed, skipped] }
        message: { type: string }
    VerifyResponse:
      type: object
      required: [checks]
      properties:
        checks:
          type: array
          items: { $ref: '#/components/schemas/VerifyCheck' }

    PushKey:
      type: object
      description: The VAPID public key for pushManager.subscribe (02 §10).
      required: [key]
      properties:
        key:
          type: string
          description: Base64url-encoded VAPID application server key.
      additionalProperties: false

    NotificationMode:
      type: object
      description: >
        The global push-notification frequency (02 §10). `blocked` — the default,
        preserving prior behavior — sends a push only when a ticket needs a human
        decision; `all` sends a push on every feed update, a testing aid for
        confirming push delivery. Extensible: more modes may be added later.
      required: [mode]
      properties:
        mode:
          type: string
          enum: [all, blocked]
          description: Which feed updates fire a push notification.
      additionalProperties: false

    PushSubscription:
      type: object
      description: >
        A browser PushSubscription as produced by
        `PushSubscription.toJSON()` — the endpoint URL plus the p256dh and auth
        keys used to encrypt Web Push payloads (RFC 8291).
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
          description: The push service URL messages are POSTed to.
        keys:
          type: object
          required: [p256dh, auth]
          properties:
            p256dh:
              type: string
              description: Base64url client public key (ECDH P-256).
            auth:
              type: string
              description: Base64url client auth secret.
          additionalProperties: false
      additionalProperties: false
    PushUnsubscribe:
      type: object
      description: >
        Identifies a browser push subscription to remove by its endpoint URL —
        the same endpoint carried in PushSubscription. No keys are needed to
        delete.
      required: [endpoint]
      properties:
        endpoint:
          type: string
          description: The push service URL of the subscription to remove.
      additionalProperties: false
