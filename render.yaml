# Kiln production topology (spec 10, phases 2–3).
# One web service (Go binary with the frontend embedded) + one managed Postgres 16.
# NOTE: for this first bring-up the resources are provisioned via the Render API
# (headless, from the connected GitHub repo) rather than a dashboard Blueprint apply.
# This file is the source-of-truth record of that topology; keep it in sync with the
# live resources. Secrets are marked `sync: false` and set out-of-band (never committed).
services:
  - type: web
    name: kiln
    runtime: docker
    plan: starter                     # $7/mo, always-on (no scale-to-zero)
    region: virginia                  # US East (user is US-based)
    branch: main
    autoDeploy: true                  # deploy-on-merge (no CI gate — see design doc, delta d)
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .                  # repo root: the Dockerfile builds frontend + embeds it
    healthCheckPath: /healthz
    envVars:
      # --- runtime ---
      - key: DATABASE_URL
        fromDatabase:
          name: kiln-db
          property: connectionString
      - key: KILN_LOG_LEVEL
        value: info
      # Per-environment worker-name scope (05 §4, amended 2026-07-05): prod owns
      # kiln-prod-worker-* exclusively, so no other Kiln instance on the shared
      # Amika account (local dev = kiln-dev-worker-, e2e) can ever adopt or sweep
      # prod's sandboxes — and prod can't touch theirs. NOTE: flipping the prefix
      # abandons the previous pool; delete the old kiln-worker-* sandboxes once.
      - key: KILN_WORKER_PREFIX
        value: kiln-prod-worker-
      - key: SENTRY_BACKEND_DSN        # backend errors/traces/logs
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AMIKA_API_KEY
        sync: false
      - key: AMIKA_CLAUDE_CRED_ID
        sync: false
      - key: AMIKA_REPO_URL
        sync: false
      - key: AMIKA_SNAPSHOT
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: GITHUB_AUTH_TOKEN
        sync: false
      - key: GITHUB_REPO_URL
        sync: false
      # Web Push VAPID pair (02 §10): both keys unset ⇒ push disabled, log-only
      # notifier. Values set out-of-band; the public key is served to clients
      # via /api/push/key, the private key never leaves the backend.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # BARE email, no mailto: prefix — webpush-go prepends mailto: itself, and a
      # doubled prefix makes Apple reject every JWT with 403 BadJwtToken.
      - key: VAPID_SUBJECT               # VAPID "sub" claim contact
        value: accounts@macmail.app
      # --- build-time (available to the Docker build; frontend bundle + source maps) ---
      - key: VITE_SENTRY_DSN           # public client DSN, baked into the bundle
        sync: false
      - key: SENTRY_AUTH_TOKEN         # source-map upload only
        sync: false

databases:
  - name: kiln-db
    plan: basic-256mb                  # ~$6/mo, daily backups + PITR
    postgresMajorVersion: "16"
    region: virginia
